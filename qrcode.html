<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMCI QR Code Generator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.6/build/qrcode.min.js"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f2744 100%);
            color: white;
            padding: 40px 20px;
            font-family: 'Poppins', sans-serif;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
            font-size: 16px;
        }
        .btn {
            display: inline-block;
            padding: 15px 45px;
            background: #f97316;
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            min-height: 48px;
        }
        .btn:hover {
            background: #ea580c;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4);
        }
        .btn-success {
            background: #22c55e;
        }
        .btn-success:hover {
            background: #16a34a;
        }
        .btn-info {
            background: #3b82f6;
        }
        .btn-info:hover {
            background: #2563eb;
        }
        #qrContainer {
            background: white;
            padding: 30px;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .back-link {
            color: #f97316;
            text-decoration: none;
            font-weight: 600;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GMCI QR Code Generator</h1>
        
        <input type="text" id="urlInput" placeholder="Enter URL" value="https://globalmission-events.github.io/EVENTS-UPDATES">
        
        <button onclick="generateQR()" class="btn">Generate QR Code</button>
        
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0;">
            <button onclick="downloadSVG()" class="btn btn-success" id="svgBtn" disabled>Download SVG (Vector)</button>
            <button onclick="downloadPNG()" class="btn btn-info" id="pngBtn" disabled>Download PNG (300 DPI)</button>
        </div>
        
        <div id="qrContainer">
            <canvas id="qrcodeCanvas" width="300" height="300"></canvas>
        </div>
        
        <p style="opacity: 0.8; margin-bottom: 20px;">Scan this QR code to visit the website!</p>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>
    
    <script>
        let currentUrl = 'https://globalmission-events.github.io/EVENTS-UPDATES';
        let qrReady = false;
        const QUIET_ZONE = 4;

        function generateQR() {
            currentUrl = document.getElementById('urlInput').value || 'https://globalmission-events.github.io/EVENTS-UPDATES';
            const canvas = document.getElementById('qrcodeCanvas');
            
            QRCode.toCanvas(canvas, currentUrl, {
                width: 300,
                errorCorrectionLevel: 'H',
                margin: QUIET_ZONE,
                color: {
                    dark: '#1e3a5f',
                    light: '#ffffff'
                }
            }, function(err) {
                if (err) {
                    console.error(err);
                    return;
                }
                
                qrReady = true;
                document.getElementById('svgBtn').disabled = false;
                document.getElementById('pngBtn').disabled = false;
            });
        }
        
        async function downloadSVG() {
            if (!qrReady) return;
            
            try {
                const svg = await QRCode.toString(currentUrl, {
                    type: 'svg',
                    errorCorrectionLevel: 'H',
                    margin: QUIET_ZONE,
                    color: {
                        dark: '#1e3a5f',
                        light: '#ffffff'
                    }
                });
                
                const blob = new Blob([svg], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'gmci-qrcode.svg';
                a.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                console.error(err);
            }
        }
        
        async function downloadPNG() {
            if (!qrReady) return;
            
            try {
                const canvas = document.createElement('canvas');
                const size = 2048;
                canvas.width = size;
                canvas.height = size;
                
                await QRCode.toCanvas(canvas, currentUrl, {
                    width: size,
                    errorCorrectionLevel: 'H',
                    margin: QUIET_ZONE,
                    color: {
                        dark: '#1e3a5f',
                        light: '#ffffff'
                    }
                });
                
                const a = document.createElement('a');
                a.download = 'gmci-qrcode.png';
                a.href = canvas.toDataURL('image/png');
                a.click();
            } catch (err) {
                console.error(err);
            }
        }
        
        // Auto-generate QR code on page load
        window.addEventListener('load', function() {
            generateQR();
        });
    </script>
</body>
</html>
