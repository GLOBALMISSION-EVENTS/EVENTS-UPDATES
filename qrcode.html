<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMCI QR Code Generator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f2744 100%);
            color: white;
            padding: 40px 20px;
            font-family: 'Poppins', sans-serif;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
            font-size: 16px;
            color: #1e3a5f;
        }
        .btn {
            display: inline-block;
            padding: 15px 45px;
            background: #f97316;
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            min-height: 48px;
        }
        .btn:hover {
            background: #ea580c;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4);
        }
        .btn-success {
            background: #22c55e;
        }
        .btn-success:hover {
            background: #16a34a;
        }
        .btn-info {
            background: #3b82f6;
        }
        .btn-info:hover {
            background: #2563eb;
        }
        #qrContainer {
            background: white;
            padding: 30px;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 20px;
            min-height: 300px;
            min-width: 300px;
        }
        .back-link {
            color: #f97316;
            text-decoration: none;
            font-weight: 600;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GMCI QR Code Generator</h1>
        
        <input type="text" id="urlInput" placeholder="Enter URL" value="https://globalmission-events.github.io/EVENTS-UPDATES">
        
        <button onclick="generateQR()" class="btn">Generate QR Code</button>
        
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0;">
            <button onclick="downloadPNG()" class="btn btn-success" id="pngBtn" disabled>Download PNG (Print Ready)</button>
        </div>
        
        <div id="qrContainer"></div>
        
        <p style="opacity: 0.8; margin-bottom: 20px;">Scan this QR code to visit the website!</p>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>
    
    <script>
        let qrcode;
        let currentUrl = 'https://globalmission-events.github.io/EVENTS-UPDATES';
        let qrReady = false;

        function generateQR() {
            const container = document.getElementById('qrContainer');
            container.innerHTML = ''; // Clear previous
            
            currentUrl = document.getElementById('urlInput').value || 'https://globalmission-events.github.io/EVENTS-UPDATES';
            
            qrcode = new QRCode(container, {
                text: currentUrl,
                width: 300,
                height: 300,
                colorDark: '#1e3a5f',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
            
            qrReady = true;
            document.getElementById('pngBtn').disabled = false;
        }
        
        function downloadPNG() {
            if (!qrReady) return;
            
            const img = document.getElementById('qrContainer').querySelector('img');
            if (img) {
                const link = document.createElement('a');
                link.download = 'gmci-qrcode.png';
                link.href = img.src;
                link.click();
            }
        }
        
        window.addEventListener('load', function() {
            generateQR();
        });
    </script>
</body>
</html>
