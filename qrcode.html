<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMCI QR Code Generator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(135deg, #1e3a5f 0%, #0f2744 100%); color:white; padding:40px;">
    <h1 style="font-family: 'Playfair Display', serif; margin-bottom:30px;">GMCI QR Code Generator</h1>
    <div style="max-width:600px; width:100%; text-align:center;">
        <input type="text" id="urlInput" placeholder="Enter URL" style="width:100%; padding:15px; border-radius:8px; border:none; margin-bottom:20px; font-size:16px;" value="https://globalmission-events.github.io/EVENTS-UPDATES">
        <button onclick="generateQR()" class="btn-primary" style="margin-bottom:30px;">Regenerate QR Code</button>
        
        <div style="display:flex; gap:15px; flex-wrap:wrap; justify-content:center; margin-bottom:20px;">
            <button onclick="downloadPNG()" class="btn-info" style="min-height:48px; padding:12px 25px;">Download PNG (300 DPI)</button>
        </div>

        <div id="qrContainer" style="background:white; padding:30px; border-radius:16px; display:inline-block; margin-bottom:20px;">
            <div id="qrcode"></div>
        </div>

        <p style="opacity:0.9; margin-bottom:10px;">
            <strong>Features:</strong> High error correction (30%), optimized for print & digital
        </p>
        <p style="opacity:0.8; font-size:14px;">
            Scan with any iOS/Android QR scanner to visit the website<br>
            Right-click the QR code to save it as an image
        </p>
        
        <a href="index.html" style="display:inline-block; margin-top:30px; color:#f97316; text-decoration:none; font-weight:600;">← Back to Home</a>
    </div>
    
    <script>
        let currentUrl = 'https://globalmission-events.github.io/EVENTS-UPDATES';

        function generateQR() {
            currentUrl = document.getElementById('urlInput').value || 'https://globalmission-events.github.io/EVENTS-UPDATES';
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = '';
            
            new QRCode(qrcodeDiv, {
                text: currentUrl,
                width: 300,
                height: 300,
                colorDark: '#1e3a5f',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function downloadPNG() {
            const img = document.querySelector('#qrcode img');
            if (img) {
                const tempDiv = document.createElement('div');
                tempDiv.style.display = 'none';
                document.body.appendChild(tempDiv);
                
                new QRCode(tempDiv, {
                    text: currentUrl,
                    width: 2000,
                    height: 2000,
                    colorDark: '#1e3a5f',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
                
                setTimeout(() => {
                    const tempImg = tempDiv.querySelector('img');
                    if (tempImg) {
                        const link = document.createElement('a');
                        link.download = 'gmci-qrcode.png';
                        link.href = tempImg.src;
                        link.click();
                    }
                    document.body.removeChild(tempDiv);
                }, 200);
            }
        }
        
        window.addEventListener('load', function() {
            generateQR();
        });
    </script>
</body>
</html>
